name: Dependency Audit

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run vulnerability audit
        run: |
          audit_exit=0
          pip-audit -r requirements.txt --format json --output pip-audit-report.json || audit_exit=$?
          if [ "$audit_exit" -gt 1 ]; then
            exit "$audit_exit"
          fi
          if [ "$audit_exit" -eq 1 ]; then
            echo "pip-audit found vulnerabilities; report uploaded as an artifact."
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
