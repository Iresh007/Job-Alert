databases:
  - name: job-alert-db
    databaseName: job_finder
    user: job_finder_user
    plan: free

services:
  - type: web
    name: job-alert-app
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-alert-db
          property: connectionString
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "10000"
      - key: ENABLE_BOARD_SCRAPERS
        value: "false"
      - key: SCAN_INTERVAL_HOURS
        value: "6"
      - key: SCRAPE_HEADLESS
        value: "true"
      - key: ADMIN_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.1

  - type: web
    name: job-alert-discord-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.discord_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-alert-db
          property: connectionString
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALERT_CHANNEL_ID
        sync: false
      - key: DISCORD_ADMIN_ROLE_ID
        sync: false
      - key: DISCORD_COMMAND_GUILD_ID
        sync: false
      - key: DISCORD_ALERT_MAX_PER_RUN
        value: "50"
      - key: PYTHON_VERSION
        value: 3.13.1

  - type: worker
    name: job-alert-scan-worker
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m app.scan_worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-alert-db
          property: connectionString
      - key: ENABLE_BOARD_SCRAPERS
        value: "false"
      - key: SCRAPE_HEADLESS
        value: "true"
      - key: EMAIL_PROVIDER
        value: outlook_graph
      - key: EMAIL_HOST
        value: smtp.office365.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: OUTLOOK_CLIENT_ID
        sync: false
      - key: OUTLOOK_TENANT
        value: consumers
      - key: OUTLOOK_GRAPH_SCOPES
        value: https://graph.microsoft.com/Mail.Send,https://graph.microsoft.com/User.Read
      - key: OUTLOOK_TOKEN_CACHE_FILE
        value: .outlook_graph_token_cache.bin
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALERT_CHANNEL_ID
        sync: false
      - key: DISCORD_ADMIN_ROLE_ID
        sync: false
      - key: DISCORD_COMMAND_GUILD_ID
        sync: false
      - key: DISCORD_ALERT_MAX_PER_RUN
        value: "50"
      - key: PYTHON_VERSION
        value: 3.13.1

        
