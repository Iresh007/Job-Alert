version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_finder
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_finder"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 5050
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/job_finder
      APP_HOST: 0.0.0.0
      APP_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy

  discord-bot:
    build: .
    command: uvicorn app.discord_service:app --host 0.0.0.0 --port 5051
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/job_finder
    ports:
      - "5051:5051"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  pgdata:
